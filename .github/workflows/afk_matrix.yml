name: AFK Earn (Matrix Concurrency)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: '运行时长（分钟，默认 300 = 5小时）'
        required: false
        default: '300'
  schedule:
    - cron: '0 */6 * * *' # 每 6 小时自动触发一次

jobs:
  afk_earn:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # GitHub 最大允许 6 小时
    strategy:
      fail-fast: false # 即使某个账号挂了，其他账号继续赚钱
      matrix:
        # 你的 5 个账号的编号
        account: [1, 2, 3, 4, 5]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests seleniumbase pyvirtualdisplay
          playwright install chromium --with-deps
          seleniumbase install chromedriver

      - name: Install WARP (Bypass CF)
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: Fix DNS & Verify WARP
        run: |
          echo "[INFO] 停用 systemd-resolved，直连 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2
          curl -s --max-time 10 [https://www.cloudflare.com/cdn-cgi/trace](https://www.cloudflare.com/cdn-cgi/trace) | grep -E 'ip=|warp=|loc=' || true

      - name: Run Matrix AFK
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ secrets[format('FREEZEHOST_DISCORD_TOKEN_{0}', matrix.account)] }}
          TG_BOT_TOKEN:             ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:               ${{ secrets.TG_CHAT_ID }}
          MAX_RUNTIME:              ${{ github.event.inputs.duration || '300' }}
          ACCOUNT_INDEX:            ${{ matrix.account }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" python afk_earn.py
